<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Accent Scoring Demo</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; max-width: 900px; }
    h1 { margin-bottom: 8px; }
    .row { margin: 12px 0; }
    textarea { width: 100%; min-height: 72px; }
    button { margin-right: 8px; padding: 8px 14px; }
    .card { border: 1px solid #ddd; border-radius: 8px; padding: 12px; margin-top: 12px; }
    .muted { color: #666; font-size: 13px; }
    .score { font-size: 24px; font-weight: bold; }
    ul { margin-top: 8px; }
    .controls { display: flex; flex-wrap: wrap; gap: 8px; }
    audio { width: 100%; margin-top: 8px; }
  </style>
</head>
<body>
  <h1>Accent Scoring Demo</h1>
  <p class="muted">Records your voice and calls <code>/score-compact</code>. Includes prompt bank, custom input, and playback loop.</p>

  <div class="row">
    <label for="prompt">Prompt text</label>
    <textarea id="prompt">This is a test sentence for accent scoring.</textarea>
    <div class="controls" style="margin-top:8px;">
      <button id="nextPromptBtn" type="button">Reload Prompt</button>
      <button id="coachPlayBtn" type="button">Play Coach Audio</button>
      <span id="promptInfo" class="muted">Prompt bank ready</span>
    </div>
  </div>

  <div class="row">
    <button id="startBtn">Start Recording</button>
    <button id="stopBtn" disabled>Stop Recording</button>
    <button id="playUserBtn" disabled>Play My Recording</button>
    <span id="status" class="muted">Idle</span>
  </div>
  <audio id="userAudioPlayer" controls style="display:none;"></audio>

  <div id="result" class="card" style="display:none;">
    <div class="score" id="overallScore">-</div>
    <div id="level"></div>
    <div class="muted" id="transcript"></div>
    <div class="muted" id="meta"></div>
    <h3>Feedback</h3>
    <ul id="feedback"></ul>
  </div>

  <script>
    let audioContext = null;
    let mediaStream = null;
    let sourceNode = null;
    let processorNode = null;
    let pcmChunks = [];
    let recordingSampleRate = 16000;
    let lastRecordingBlob = null;
    let lastRecordingUrl = "";

    const promptBank = [
      "cat","dog","book","pen","school","teacher","student","market","computer","phone",
      "table","chair","window","mirror","water","coffee","breakfast","lunch","dinner","family",
      "friend","mother","father","brother","sister","music","movie","travel","ticket","passport",
      "station","engineer","doctor","nurse","project","meeting","future","history","science","language",
      "practice","accent","rhythm","stress","intonation","clarity","confidence","global","culture","business",
      "The weather is pleasant today.",
      "Please speak slowly and clearly.",
      "I would like to improve my pronunciation.",
      "Can you repeat that sentence again?",
      "She bought a cup of hot coffee.",
      "We are planning a trip next month.",
      "The meeting starts at nine o clock.",
      "He reads the newspaper every morning.",
      "They moved to a new apartment.",
      "This project is very important for us.",
      "I need to finish this task today.",
      "Could you help me with this form?",
      "My favorite season is winter.",
      "We should leave before traffic begins.",
      "Please turn off your mobile phone.",
      "He works as a software engineer.",
      "The doctor asked me to rest.",
      "She is learning spoken English online.",
      "I usually wake up at six.",
      "The train arrived ten minutes late.",
      "Let us discuss this after lunch.",
      "Your presentation was clear and simple.",
      "I forgot to bring my wallet.",
      "Can I get a glass of water?",
      "They are building a new bridge.",
      "Our team won the final match.",
      "I enjoy reading books at night.",
      "Please submit the report by Friday.",
      "He called me as soon as he reached home.",
      "She speaks with great confidence.",
      "I am trying to reduce my accent.",
      "The classroom is on the second floor.",
      "We had a productive discussion today.",
      "He answered all the questions correctly.",
      "The internet connection is unstable right now.",
      "Let me know when you are free.",
      "I will join the meeting in five minutes.",
      "This sentence helps train the th sound.",
      "Practice makes your speech more natural.",
      "Focus on stress rhythm and pauses.",
      "Please record your voice one more time.",
      "Listen carefully and imitate the coach.",
      "Your goal is clear speech not speed.",
      "Small improvements lead to big progress.",
      "Try to open your mouth a little more.",
      "Breathe and speak one phrase at a time.",
      "Today we will practice difficult vowels.",
      "Keep your tongue relaxed for this sound.",
      "Say the sentence again with better intonation.",
      "You are doing a great job so far."
    ];
    let promptIdx = 0;

    const startBtn = document.getElementById("startBtn");
    const stopBtn = document.getElementById("stopBtn");
    const playUserBtn = document.getElementById("playUserBtn");
    const nextPromptBtn = document.getElementById("nextPromptBtn");
    const coachPlayBtn = document.getElementById("coachPlayBtn");
    const promptInfo = document.getElementById("promptInfo");
    const promptEl = document.getElementById("prompt");
    const userAudioPlayer = document.getElementById("userAudioPlayer");
    const statusEl = document.getElementById("status");
    const resultEl = document.getElementById("result");

    function pickPrompt() {
      promptIdx = Math.floor(Math.random() * promptBank.length);
      promptEl.value = promptBank[promptIdx];
      promptInfo.textContent = `Prompt ${promptIdx + 1} / ${promptBank.length}`;
    }

    async function startRecording() {
      mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: recordingSampleRate });
      sourceNode = audioContext.createMediaStreamSource(mediaStream);
      processorNode = audioContext.createScriptProcessor(4096, 1, 1);
      pcmChunks = [];

      processorNode.onaudioprocess = (event) => {
        const input = event.inputBuffer.getChannelData(0);
        pcmChunks.push(new Float32Array(input));
      };

      sourceNode.connect(processorNode);
      processorNode.connect(audioContext.destination);
      statusEl.textContent = "Recording...";
      startBtn.disabled = true;
      stopBtn.disabled = false;
    }

    async function stopRecording() {
      if (!audioContext || !processorNode || !mediaStream) return;

      processorNode.disconnect();
      sourceNode.disconnect();
      mediaStream.getTracks().forEach((t) => t.stop());
      await audioContext.close();

      const blob = float32ToWavBlob(pcmChunks, recordingSampleRate);
      lastRecordingBlob = blob;
      if (lastRecordingUrl) URL.revokeObjectURL(lastRecordingUrl);
      lastRecordingUrl = URL.createObjectURL(blob);
      userAudioPlayer.src = lastRecordingUrl;
      userAudioPlayer.style.display = "block";
      playUserBtn.disabled = false;
      statusEl.textContent = "Processing...";
      startBtn.disabled = false;
      stopBtn.disabled = true;
      await submitAudio(blob);
    }

    async function submitAudio(blob) {
      try {
        const prompt = document.getElementById("prompt").value;
        const formData = new FormData();
        formData.append("prompt_text", prompt);
        formData.append("audio_file", blob, "recording.wav");

        const res = await fetch("/score-compact", {
          method: "POST",
          body: formData
        });
        const data = await res.json();
        if (!res.ok) {
          throw new Error(data.detail || "Failed to score audio");
        }

        renderResult(data);
        statusEl.textContent = "Done";
      } catch (err) {
        statusEl.textContent = `Error: ${err.message}`;
      }
    }

    function float32ToWavBlob(chunks, sampleRate) {
      const totalLength = chunks.reduce((sum, c) => sum + c.length, 0);
      const samples = new Float32Array(totalLength);
      let offset = 0;
      for (const chunk of chunks) {
        samples.set(chunk, offset);
        offset += chunk.length;
      }

      const wavBuffer = encodeWav(samples, sampleRate);
      return new Blob([wavBuffer], { type: "audio/wav" });
    }

    function encodeWav(samples, sampleRate) {
      const buffer = new ArrayBuffer(44 + samples.length * 2);
      const view = new DataView(buffer);

      writeString(view, 0, "RIFF");
      view.setUint32(4, 36 + samples.length * 2, true);
      writeString(view, 8, "WAVE");
      writeString(view, 12, "fmt ");
      view.setUint32(16, 16, true);
      view.setUint16(20, 1, true);
      view.setUint16(22, 1, true);
      view.setUint32(24, sampleRate, true);
      view.setUint32(28, sampleRate * 2, true);
      view.setUint16(32, 2, true);
      view.setUint16(34, 16, true);
      writeString(view, 36, "data");
      view.setUint32(40, samples.length * 2, true);

      let index = 44;
      for (let i = 0; i < samples.length; i++) {
        const s = Math.max(-1, Math.min(1, samples[i]));
        view.setInt16(index, s < 0 ? s * 0x8000 : s * 0x7fff, true);
        index += 2;
      }
      return buffer;
    }

    function writeString(view, offset, value) {
      for (let i = 0; i < value.length; i++) {
        view.setUint8(offset + i, value.charCodeAt(i));
      }
    }

    function playCoachAudio() {
      const txt = promptEl.value.trim();
      if (!txt) return;
      const utter = new SpeechSynthesisUtterance(txt);
      utter.rate = 0.9;
      utter.pitch = 1.0;
      window.speechSynthesis.cancel();
      window.speechSynthesis.speak(utter);
    }

    function renderResult(data) {
      document.getElementById("overallScore").textContent = `Overall: ${data.overall_score}`;
      document.getElementById("level").textContent = `Level: ${data.level}`;
      document.getElementById("transcript").textContent = `Transcript: ${data.transcript}`;
      const content = Number(data.content_score ?? 0).toFixed(2);
      const accent = Number(data.accent_score ?? 0).toFixed(2);
      const phoneme = Number(data.phoneme_score ?? 0).toFixed(2);
      const dual = data.dual_mode ? "dual ASR " : "";
      document.getElementById("meta").textContent = `${dual}Content: ${content} | Accent: ${accent} | Phoneme: ${phoneme} | WER: ${Number(data.wer).toFixed(4)}`;

      const list = document.getElementById("feedback");
      list.innerHTML = "";
      const feedback = data.feedback || [];
      if (!feedback.length) {
        const li = document.createElement("li");
        li.textContent = "Great job. No major weak phoneme patterns detected.";
        list.appendChild(li);
      } else {
        feedback.forEach((f) => {
          const li = document.createElement("li");
          li.textContent = `${f.phone} (${f.avg_score}): ${f.tip}`;
          list.appendChild(li);
        });
      }
      resultEl.style.display = "block";
    }

    startBtn.addEventListener("click", startRecording);
    stopBtn.addEventListener("click", () => { stopRecording(); });
    playUserBtn.addEventListener("click", () => {
      if (!lastRecordingBlob) return;
      userAudioPlayer.play();
    });
    nextPromptBtn.addEventListener("click", pickPrompt);
    coachPlayBtn.addEventListener("click", playCoachAudio);

    pickPrompt();
  </script>
</body>
</html>
